<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo - Museu</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
font-family: Arial;
background: #f5f5f5;
margin: 0;
}

header {
background: #1d3557;
color: white;
padding: 20px;
text-align: center;
}

.container {
width: 95%;
max-width: 1000px;
margin: 20px auto;
}

.card {
background: white;
padding: 20px;
border-radius: 10px;
margin-bottom: 20px;
}

.form-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}

input, textarea {
padding: 10px;
width: 100%;
}

.full {
grid-column: 1/3;
}

button {
padding: 10px;
cursor: pointer;
border: none;
color: white;
}

.ia { background: purple; }
.salvar { background: green; }

table {
width: 100%;
border-collapse: collapse;
}

th {
background: #1d3557;
color: white;
padding: 10px;
}

td {
padding: 10px;
border: 1px solid #ddd;
}

#statusIA {
margin-top: 10px;
display: none;
padding: 10px;
background: #eee;
}
</style>

</head>

<body>

<header>
<h1>Museu das Comunicações</h1>
<p>Painel Admin</p>
</header>

<div class="container">

<div class="card">

<h2>Cadastro de Peça</h2>

<form id="formCadastro">

<div class="form-grid">

<input id="nome" placeholder="Nome">
<input id="modelo" placeholder="Modelo">
<input id="fabricante" placeholder="Fabricante">
<input id="ano" placeholder="Ano">
<input id="local" placeholder="Local">
<input id="gentileza" placeholder="Gentileza">

<div class="full">
<input type="file" id="documento">

<div id="statusIA">A analisar...</div>
</div>

<div class="full">
<textarea id="descricao" placeholder="Descrição"></textarea>
</div>

</div>

<button type="button" class="ia" onclick="extrairIA()">Extrair com IA</button>
<button type="submit" class="salvar">Salvar</button>

</form>

</div>

<div class="card">

<h2>Peças</h2>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Modelo</th>
<th>Fabricante</th>
<th>Ano</th>
<th>Código</th>
</tr>
</thead>

<tbody id="tabelaPecas"></tbody>
</table>

</div>

</div>

<script>
/* =========================
   SUPABASE (CORRETO)
========================= */

const SUPABASE_URL = "https://jwubihdljxgmzdymdufs.supabase.co";
const SUPABASE_KEY = "sb_publishable_PDGCiGQngJJCUDrSYAIA2w_VuFBLPOP";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* =========================
   IA EXTRACAO
========================= */

async function extrairIA() {

const ficheiro = document.getElementById("documento").files[0];

if (!ficheiro) {
alert("Escolhe um ficheiro!");
return;
}

document.getElementById("statusIA").style.display = "block";
document.getElementById("statusIA").innerText = "A analisar com IA...";

try {

const response = await fetch("/api/extrair", {
method: "POST",
body: ficheiro
});

const data = await response.json();

document.getElementById("nome").value = data.nome || "";
document.getElementById("modelo").value = data.modelo || "";
document.getElementById("fabricante").value = data.fabricante || "";
document.getElementById("ano").value = data.ano || "";
document.getElementById("descricao").value = data.descricao || "";

document.getElementById("statusIA").innerText = "IA concluída ✔️";

} catch (err) {
console.log(err);
alert("Erro na IA");
}

}

/* =========================
   SALVAR
========================= */

document.getElementById("formCadastro").addEventListener("submit", async (e) => {
e.preventDefault();

const dados = {
nome: nome.value,
modelo: modelo.value,
fabricante: fabricante.value,
ano_fabrico: ano.value,
local_uso: local.value,
gentileza: gentileza.value,
descricao_completa: descricao.value,
codigo: "MUS-" + Date.now()
};

const { error } = await supabaseClient
.from("pecas")
.insert([dados]);

if (error) {
alert("Erro ao salvar");
console.log(error);
return;
}

alert("Salvo com sucesso!");
carregarPecas();
});

/* =========================
   CARREGAR
========================= */

async function carregarPecas() {

const { data } = await supabaseClient
.from("pecas")
.select("*")
.order("id", { ascending: false });

let html = "";

data?.forEach(p => {
html += `
<tr>
<td>${p.nome || ""}</td>
<td>${p.modelo || ""}</td>
<td>${p.fabricante || ""}</td>
<td>${p.ano_fabrico || ""}</td>
<td>${p.codigo || ""}</td>
</tr>`;
});

document.getElementById("tabelaPecas").innerHTML = html;

}

carregarPecas();

</script>

</body>
</html>
